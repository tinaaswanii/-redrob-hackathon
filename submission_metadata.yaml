methodology_summary: >
  Rule-based, fully-explainable scoring pipeline (no trained model, no LLM
  calls during ranking). Separates skills-list keyword signal from career-
  history keyword signal to avoid rewarding keyword-stuffed profiles over
  candidates with real applied-ML/retrieval/ranking experience, per the JD's
  explicit warning. Combines experience relevance, skills relevance,
  years-of-experience fit, location fit, and behavioral availability into a
  weighted composite score, with hard exclusion for profiles that fail
  internal-consistency (honeypot) checks. Runs end-to-end on the full 100K
  candidate pool in under a minute, well inside the 5-minute / 16GB / CPU-only
  compute budget.
